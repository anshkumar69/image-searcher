<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Searching</title>
    <link rel="stylesheet" href="/Image_Searching/image.css">
    <link rel="stylesheet" href="./loader.css">
</head>

<body>
    <div>
        <h1>Image Searching App</h1>
        <div class="container">
            <form>
                <input type="text" name="Image" placeholder="Search An Image" id="image-input">
                <button id="searchbtn">Search</button>
            </form>
        </div>
        <div class="container2">
        </div>
        <div class="hide loader-container">
            <div class="loader"></div>
            <pre class="loader-text">   Loading...</pre>
        </div>
        <div class="showmore">
            <button id="morebtn">Show More</button>
        </div>
    </div>
    <script src="app.js">
    </script>
</body>

</html>
